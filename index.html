<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fortune App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #calendar {
            margin: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #fortuneTube {
            margin: 20px;
            perspective: 1000px;
        }
        .stick {
            width: 10px;
            height: 50px;
            background: linear-gradient(to top, #4caf50, #f5e13e);
            margin: 5px;
            display: inline-block;
            border-radius: 5px;
            animation: spin 3s infinite;
        }
        @keyframes spin {
            0% { transform: rotateY(0); }
            100% { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>
    <h1>Welcome to My Fortune App</h1>
    <div id="calendar">
        <h2>Current Date and Time in Beijing</h2>
        <p id="current-time"></p>
        <script>
            function updateTime() {
                const options = { year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', timeZone: 'Asia/Shanghai' };
                document.getElementById('current-time').textContent = new Date().toLocaleString('en-US', options);
            }
            setInterval(updateTime, 1000);
            updateTime();
        </script>
    </div>
    <div id="fortuneTube">
        <h2>Interactive 3D Fortune Stick Tube</h2>
        <div id="sticks" style="display: flex; justify-content: center;">
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
        </div>
    </div>
</body>
</html>
