<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日运势签</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">今日运势签</h1>
        
        <!-- 日历和时间区块 -->
        <div class="calendar-card">
            <div class="calendar-content">
                <div class="date-display">
                    <div class="gregorian-date">
                        <span id="gregorianDate"></span>
                    </div>
                    <div class="lunar-date">
                        <span id="lunarDate"></span>
                    </div>
                </div>
                <div class="time-display">
                    <span id="currentTime"></span>
                </div>
            </div>
        </div>

        <!-- 抽签互动区块 -->
        <div class="fortune-card">
            <!-- 签筒和签条显示 -->
            <div id="stickContainer" class="stick-container">
                <div class="stick-tube-wrapper">
                    <!-- 3D签筒主体 -->
                    <div class="stick-tube" id="stickTube">
                        <!-- 上装饰（莲花瓣） -->
                        <div class="tube-top-decoration">
                            <div class="petal"></div>
                            <div class="petal"></div>
                            <div class="petal"></div>
                            <div class="petal"></div>
                            <div class="petal"></div>
                        </div>
                        
                        <!-- 金色装饰环 -->
                        <div class="gold-ring"></div>
                        
                        <!-- 签条扇形排列 -->
                        <div class="sticks-fan">
                            <div class="stick-item stick-1"></div>
                            <div class="stick-item stick-2"></div>
                            <div class="stick-item stick-3"></div>
                            <div class="stick-item stick-4"></div>
                            <div class="stick-item stick-5"></div>
                            <div class="stick-item stick-6"></div>
                            <div class="stick-item stick-7"></div>
                        </div>
                    </div>
                </div>
                <div class="stick-hint">点击签筒抽签</div>
            </div>

            <!-- 签文显示 -->
            <div class="fortune-content" id="fortuneContent" style="display: none;">
                <div class="fortune-text" id="fortuneText"></div>
                <div class="fortune-level" id="fortuneLevel"></div>
            </div>
        </div>

        <!-- 重新抽签按钮 -->
        <button class="button" id="drawButton" style="display: none;">
            <span id="buttonText">重新抽签</span>
        </button>
    </div>

    <script src="js/lunar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
